id: SPEC-018
title: Add an acronym shell helper
risk_class: low
depends_on: []
objective: >
  A reusable Bash function acronym exists at scripts/lib/acronym.sh that converts
  a space-separated phrase into its uppercase acronym (first letter of each word),
  with a test that pins its behaviour.
in_scope:
  - scripts/lib/**
  - tests/acronym.sh
out_of_scope:
  - .github/**
  - scripts/test
  - specs/**
  - .orchestrator/**
acceptance_criteria:
  - "scripts/lib/acronym.sh defines a function acronym that reads its first argument and prints the acronym to stdout."
  - "Behaviour: split on whitespace; take the first character of each word; uppercase it; concatenate with no separator."
  - "tests/acronym.sh sources the helper and asserts: 'as soon as possible' -> 'ASAP'; 'hello world' -> 'HW'; '' -> ''."
  - "tests/acronym.sh exits 0 when all assertions pass."
test_command: "bash tests/acronym.sh"
hard_ceiling_hours: 2
needs_network: false
context:
  - tests/smoke.sh
